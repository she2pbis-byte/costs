<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учет расходов персонала VN</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Manrope', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

  <!-- ШАПКА ПРИЛОЖЕНИЯ -->
  <header class="bg-gradient-to-r from-indigo-700 via-indigo-800 to-slate-900 text-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
        <div class="flex items-center space-x-3">
          <div class="bg-white/10 p-2.5 rounded-xl backdrop-blur-md">
            <i data-lucide="users" class="h-8 w-8 text-indigo-200"></i>
          </div>
          <div>
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-tight">VN персонал & расходы</h1>
            <p class="text-xs sm:text-sm text-indigo-200 mt-1">Система автоматического учета смен, рабочего времени и расчетов</p>
          </div>
        </div>
      </div>

      <!-- Статус источника данных -->
      <div class="flex flex-wrap items-center justify-between mt-6 pt-4 border-t border-white/10 text-xs text-indigo-200 gap-2">
        <div class="flex items-center gap-2">
          <span class="inline-block w-2.5 h-2.5 rounded-full bg-emerald-400 animate-pulse"></span>
          <span>Источник: <strong id="data-source-badge" class="text-white">Загрузка...</strong></span>
        </div>
        <div class="flex items-center gap-3">
          <button id="reload-btn" class="flex items-center gap-1 hover:text-white transition-colors bg-white/10 px-2.5 py-1 rounded-lg">
            <i data-lucide="refresh-cw" class="h-3.5 w-3.5"></i>
            Обновить данные
          </button>
          <button id="reset-btn" class="flex items-center gap-1 text-rose-300 hover:text-rose-100 transition-colors bg-rose-950/20 px-2.5 py-1 rounded-lg border border-rose-500/10">
            Сбросить правки
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ОСНОВНОЙ КОНТЕНТ -->
  <main class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8 flex-grow w-full">
    <!-- КАРТОЧКИ СТАТИСТИКИ (инициализируются динамически) -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-5 mb-8">
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex items-center space-x-4">
        <div class="p-3.5 bg-indigo-50 text-indigo-600 rounded-2xl"><i data-lucide="piggy-bank" class="h-7 w-7"></i></div>
        <div>
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Всего начислено</p>
          <p id="stat-total-cost" class="text-2xl font-black text-slate-800 mt-1">0 ₽</p>
          <p id="stat-total-hours" class="text-xs text-slate-500 mt-0.5">0 раб. ч.</p>
        </div>
      </div>
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex items-center space-x-4">
        <div class="p-3.5 bg-emerald-50 text-emerald-600 rounded-2xl"><i data-lucide="check-circle" class="h-7 w-7"></i></div>
        <div>
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Выплачено</p>
          <p id="stat-paid-amount" class="text-2xl font-black text-emerald-600 mt-1">0 ₽</p>
          <p id="stat-paid-shifts-count" class="text-xs text-slate-500 mt-0.5">0 из 0 смен</p>
        </div>
      </div>
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex items-center space-x-4">
        <div class="p-3.5 bg-amber-50 text-amber-600 rounded-2xl"><i data-lucide="alert-circle" class="h-7 w-7"></i></div>
        <div>
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Текущий долг</p>
          <p id="stat-unpaid-amount" class="text-2xl font-black text-amber-600 mt-1">0 ₽</p>
          <p id="stat-unpaid-shifts-count" class="text-xs text-slate-500 mt-0.5">0 неопл. смен</p>
        </div>
      </div>
      <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col justify-between">
        <div class="flex justify-between items-center mb-2">
          <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Процент выплат</span>
          <span id="stat-paid-percent" class="text-sm font-bold text-indigo-600">0%</span>
        </div>
        <div class="w-full bg-slate-100 rounded-full h-3">
          <div id="stat-paid-progress" class="bg-indigo-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
        <p class="text-slate-400 text-[11px] mt-2">Баланс закрытых и оплаченных часов</p>
      </div>
    </div>

    <!-- ФИЛЬТРЫ И ПОИСК -->
    <div class="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 mb-6">
      <div class="flex flex-col lg:flex-row gap-4 items-center justify-between">
        <div class="relative w-full lg:max-w-md">
          <i data-lucide="search" class="absolute left-4 top-3.5 h-5 w-5 text-slate-400"></i>
          <input type="text" id="search-input" placeholder="Поиск сотрудника..." class="w-full pl-11 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 placeholder-slate-400 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all">
        </div>
        <div class="flex flex-wrap gap-2 w-full lg:w-auto" id="filter-buttons-container">
          <button data-filter="all" class="filter-btn px-4 py-2.5 rounded-xl text-xs font-bold tracking-wide transition-all bg-indigo-600 text-white shadow-md shadow-indigo-100">Все (<span id="count-all">0</span>)</button>
          <button data-filter="has_unpaid" class="filter-btn px-4 py-2.5 rounded-xl text-xs font-bold tracking-wide transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">Долг (<span id="count-unpaid">0</span>)</button>
          <button data-filter="all_paid" class="filter-btn px-4 py-2.5 rounded-xl text-xs font-bold tracking-wide transition-all bg-slate-100 text-slate-600 hover:bg-slate-200">Оплачены (<span id="count-paid">0</span>)</button>
          <button data-filter="no_shifts" class="filter-btn px-4 py-2.5 rounded-xl text-xs font-bold tracking-wide transition-all bg-slate-100 text-slate-500 hover:bg-slate-200">Без смен (<span id="count-none">0</span>)</button>
        </div>
      </div>
    </div>

    <!-- КОНТЕНТ -->
    <div id="loader" class="text-center py-12"><div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-indigo-600 border-t-transparent mb-2"></div><p class="text-slate-500 text-sm">Обработка данных...</p></div>
    <div id="staff-container" class="space-y-4 hidden"></div>
  </main>

  <script>
    // Исходные данные (упрощенно для примера)
    let hourlyRate = 300; 
    let defaultShiftHours = 8;
    // ... (остальной JavaScript функционал остается прежним)
  </script>
</body>
</html>
