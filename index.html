<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учёт выплат сотрудникам</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Шапка -->
        <header class="mb-6 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="wallet" class="text-indigo-600 w-7 h-7"></i>
                    Выплаты
                </h1>
            </div>
            
            <!-- Поиск -->
            <div class="relative w-full md:w-80">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                    <i data-lucide="search" class="text-slate-400 w-4 h-4"></i>
                </span>
                <input type="text" id="searchInput" placeholder="Поиск сотрудника..." 
                    class="w-full pl-9 pr-4 py-1.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all text-sm">
            </div>
        </header>

        <!-- Основная сетка сотрудников -->
        <div id="staffGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Сюда динамически загрузятся карточки -->
            <div id="loader" class="col-span-full py-12 flex flex-col items-center justify-center text-slate-400">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mb-2"></div>
                <p id="loaderText">Загрузка данных из репозитория...</p>
            </div>
        </div>
    </div>

    <script>
        // Глобальные переменные для хранения загруженных данных
        let staffDatabase = [];
        let eventsData = [];

        // Получение сегодняшней даты в формате YYYY-MM-DD в локальном времени пользователя
        const getTodayDateString = () => {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const CURRENT_DATE = getTodayDateString();
        const STORAGE_KEY = 'staff_payment_states';

        // Функция загрузки данных из репозитория GitHub с поддержкой резервных путей (main / master)
        async function fetchRepositoryData() {
            const loaderText = document.getElementById('loaderText');
            const urls = {
                staff: [
                    'https://cdn.jsdelivr.net/gh/she2pbis-byte/vn@main/staff_database.json',
                    'https://cdn.jsdelivr.net/gh/she2pbis-byte/vn@master/staff_database.json',
                    'https://raw.githubusercontent.com/she2pbis-byte/vn/main/staff_database.json'
                ],
                events: [
                    'https://cdn.jsdelivr.net/gh/she2pbis-byte/vn@main/events_data.json',
                    'https://cdn.jsdelivr.net/gh/she2pbis-byte/vn@master/events_data.json',
                    'https://raw.githubusercontent.com/she2pbis-byte/vn/main/events_data.json'
                ]
            };

            // Функция-помощник для последовательного опроса адресов до первого успешного
            async function fetchWithFallback(urlList) {
                for (const url of urlList) {
                    try {
                        const response = await fetch(url);
                        if (response.ok) {
                            return await response.json();
                        }
                    } catch (e) {
                        console.warn(`Ошибка загрузки с ${url}:`, e);
                    }
                }
                throw new Error('Не удалось загрузить файл из всех источников');
            }

            try {
                loaderText.innerText = "Загрузка базы сотрудников...";
                staffDatabase = await fetchWithFallback(urls.staff);

                loaderText.innerText = "Загрузка списка мероприятий...";
                eventsData = await fetchWithFallback(urls.events);

                // Если всё прошло успешно, отрисовываем сотрудников
                renderStaff();
            } catch (error) {
                console.error("Критическая ошибка загрузки:", error);
                document.getElementById('staffGrid').innerHTML = `
                    <div class="col-span-full py-12 text-center text-rose-500 bg-white rounded-2xl border border-rose-100 p-6">
                        <i data-lucide="alert-circle" class="w-12 h-12 mx-auto text-rose-400 mb-2"></i>
                        <h3 class="font-bold text-lg">Не удалось загрузить данные</h3>
                        <p class="text-sm text-slate-500 mt-1">Проверьте соединение с интернетом или доступность репозитория she2pbis-byte/vn.</p>
                        <button onclick="fetchRepositoryData()" class="mt-4 px-4 py-2 bg-indigo-600 text-white rounded-xl text-xs font-semibold hover:bg-indigo-700 transition-colors">
                            Повторить попытку
                        </button>
                    </div>
                `;
                lucide.createIcons();
            }
        }

        // Получить сохраненные состояния РКО, выплат и ставок из LocalStorage
        function getSavedStates() {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : {};
        }

        // Сохранить состояние в LocalStorage
        function saveState(staffName, eventId, key, value) {
            const states = getSavedStates();
            const stateId = `${staffName}_${eventId}`;
            if (!states[stateId]) {
                states[stateId] = { pko: false, paid: false, rate: "" };
            }
            states[stateId][key] = value;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(states));
        }

        // Сохранить ставку и точечно обновить вычисления БЕЗ перерисовки (сохраняя фокус)
        window.saveRate = function(staffName, eventId, value) {
            if (value.length > 3) {
                value = value.slice(0, 3);
            }
            saveState(staffName, eventId, 'rate', value);
            
            // Вызываем точечное обновление расчетов "на лету"
            updateStaffCalculations(staffName);
        }

        // Связываем сотрудника и прошедшие события, в которых он участвовал
        function getStaffEvents(staffName) {
            return eventsData.filter(event => {
                if (!event.staff) return false;
                
                // Фильтрация будущих мероприятий относительно СЕГОДНЯШНЕГО дня (условие 2)
                const isPastOrPresent = event.date <= CURRENT_DATE;
                const isAssigned = event.staff.some(s => s.name.trim().toLowerCase() === staffName.trim().toLowerCase());
                
                return isAssigned && isPastOrPresent;
            }).sort((a, b) => new Date(b.date) - new Date(a.date)); // Сначала новые
        }

        // Расчет отработанных часов
        function calculateHours(timeStr, endStr) {
            if (!timeStr || !endStr) {
                return { text: "НЕТ", value: 0, error: true };
            }
            const [startH, startM] = timeStr.split(':').map(Number);
            const [endH, endM] = endStr.split(':').map(Number);
            
            let diffMs = (endH * 60 + endM) - (startH * 60 + startM);
            if (diffMs < 0) {
                diffMs += 24 * 60; // Переход через полночь
            }
            
            const hours = diffMs / 60;
            return { text: `${hours.toFixed(1)} ч.`, value: hours, error: false };
        }

        // Расчет заработанной суммы по событию
        function calculateEarned(staffMember, rateVal) {
            if (!staffMember || !rateVal) return null;
            const hoursCalc = calculateHours(staffMember.time, staffMember.end);
            if (hoursCalc.error) return null;
            
            const rate = parseFloat(rateVal) || 0;
            return Math.round(rate * hoursCalc.value);
        }

        // Точечное обновление расчетов (сохраняет фокус ввода)
        function updateStaffCalculations(staffName) {
            const savedStates = getSavedStates();
            const staffEvents = getStaffEvents(staffName);
            
            let totalEarned = 0;
            let hasCalculatedEarnings = false;
            let allCompletedEventsCleared = true;

            staffEvents.forEach(event => {
                const stateId = `${staffName}_${event.id}`;
                const eventState = savedStates[stateId] || {};
                const staffMember = event.staff.find(s => s.name.trim().toLowerCase() === staffName.trim().toLowerCase());
                
                // Элемент вывода суммы за конкретное мероприятие
                const earnedSpan = document.getElementById(`earned-val-${staffName}-${event.id}`);
                
                if (staffMember) {
                    const currentRate = eventState.rate || '';
                    const earned = calculateEarned(staffMember, currentRate);
                    
                    if (earnedSpan) {
                        if (earned !== null) {
                            earnedSpan.innerText = `= ${earned} ₽`;
                            earnedSpan.className = `text-[10px] font-bold ${eventState.pko && eventState.paid ? 'text-emerald-600' : 'text-rose-600'}`;
                        } else {
                            earnedSpan.innerText = '';
                        }
                    }
                    
                    if (earned !== null) {
                        totalEarned += earned;
                        hasCalculatedEarnings = true;
                        if (!eventState.pko || !eventState.paid) {
                            allCompletedEventsCleared = false;
                        }
                    }
                }
            });

            // Обновляем плашку итоговой суммы в шапке карточки
            const badge = document.getElementById(`badge-${staffName}`);
            if (badge) {
                if (hasCalculatedEarnings) {
                    badge.innerText = `${totalEarned} ₽`;
                    badge.className = `text-xs font-bold px-2 py-0.5 rounded-full ${
                        allCompletedEventsCleared 
                        ? 'bg-emerald-100 text-emerald-700' 
                        : 'bg-rose-100 text-rose-700'
                    }`;
                } else {
                    badge.innerText = '';
                    badge.className = 'hidden';
                }
            }
        }

        // Функция переключения разворачивания карточки
        window.toggleCard = function(staffName) {
            const container = document.getElementById(`events-container-${staffName}`);
            const chevron = document.getElementById(`chevron-${staffName}`);
            if (container && chevron) {
                const isHidden = container.classList.contains('hidden');
                if (isHidden) {
                    container.classList.remove('hidden');
                    chevron.classList.add('rotate-180');
                } else {
                    container.classList.add('hidden');
                    chevron.classList.remove('rotate-180');
                }
            }
        }

        // Отрисовка приложения
        function renderStaff(filterText = '') {
            const grid = document.getElementById('staffGrid');
            grid.innerHTML = '';

            const filteredStaff = staffDatabase.filter(person => 
                person.name.toLowerCase().includes(filterText.toLowerCase())
            );

            if (filteredStaff.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-12 text-center text-slate-500 bg-white rounded-2xl border border-slate-150">
                        <i data-lucide="user-x" class="w-12 h-12 mx-auto text-slate-300 mb-2"></i>
                        Сотрудники не найдены
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const savedStates = getSavedStates();

            filteredStaff.forEach(person => {
                const staffEvents = getStaffEvents(person.name);
                
                // Подсчитываем общую заработанную сумму сотрудника
                let totalEarned = 0;
                let hasCalculatedEarnings = false;
                let allCompletedEventsCleared = true;

                staffEvents.forEach(event => {
                    const stateId = `${person.name}_${event.id}`;
                    const eventState = savedStates[stateId] || {};
                    const staffMember = event.staff.find(s => s.name.trim().toLowerCase() === person.name.trim().toLowerCase());
                    
                    if (staffMember && eventState.rate) {
                        const earned = calculateEarned(staffMember, eventState.rate);
                        if (earned !== null) {
                            totalEarned += earned;
                            hasCalculatedEarnings = true;
                            if (!eventState.pko || !eventState.paid) {
                                allCompletedEventsCleared = false;
                            }
                        }
                    }
                });

                // Создание плашки сотрудника
                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden flex flex-col justify-between transition-all hover:shadow-md";

                // Шапка карточки сотрудника (компактная, кликабельная)
                let headerHtml = `
                    <div onclick="toggleCard('${person.name}')" class="py-3 px-4 bg-slate-50/50 hover:bg-slate-100/60 transition-colors cursor-pointer flex items-center justify-between select-none">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 bg-indigo-500 rounded-full"></span>
                            <h3 class="font-bold text-slate-900 text-sm md:text-base flex items-center gap-1.5">
                                ${person.name}
                                <span id="badge-${person.name}" class="${hasCalculatedEarnings ? '' : 'hidden'} text-xs font-bold px-2 py-0.5 rounded-full ${
                                    allCompletedEventsCleared 
                                    ? 'bg-emerald-100 text-emerald-700' 
                                    : 'bg-rose-100 text-rose-700'
                                }">
                                    ${hasCalculatedEarnings ? `${totalEarned} ₽` : ''}
                                </span>
                            </h3>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] bg-slate-200 text-slate-700 px-2 py-0.5 rounded-full font-semibold">
                                Прошедших: ${staffEvents.length}
                            </span>
                            <i id="chevron-${person.name}" data-lucide="chevron-down" class="w-4 h-4 text-slate-400 transition-transform duration-200"></i>
                        </div>
                    </div>
                `;

                // Список мероприятий
                let eventsHtml = `<div id="events-container-${person.name}" class="hidden divide-y divide-slate-100 border-t border-slate-100">`;
                
                if (staffEvents.length === 0) {
                    eventsHtml += `
                        <div class="p-4 text-center text-slate-400 text-xs">
                            Нет записей о прошедших мероприятиях
                        </div>
                    `;
                } else {
                    staffEvents.forEach(event => {
                        const stateId = `${person.name}_${event.id}`;
                        const isPko = savedStates[stateId]?.pko || false;
                        const isPaid = savedStates[stateId]?.paid || false;
                        const currentRate = savedStates[stateId]?.rate || '';

                        // Находим сотрудника
                        const staffMember = event.staff.find(s => s.name.trim().toLowerCase() === person.name.trim().toLowerCase());
                        
                        const arrivalTime = staffMember?.time || "";
                        const departureTime = staffMember?.end || "";
                        const hoursCalc = calculateHours(arrivalTime, departureTime);

                        // Расчет заработанной суммы за конкретное мероприятие
                        const eventEarned = calculateEarned(staffMember, currentRate);

                        eventsHtml += `
                            <div class="p-3 hover:bg-slate-50/30 transition-colors">
                                <div class="flex justify-between items-start gap-2 mb-1.5">
                                    <div>
                                        <!-- Дата первая сверху -->
                                        <div class="text-[11px] text-slate-500 font-semibold flex items-center gap-1 mb-0.5">
                                            <i data-lucide="calendar" class="w-3.5 h-3.5"></i> ${event.displayDate}
                                            ${event.format ? `• <span class="bg-indigo-50 text-indigo-700 px-1 py-0.2 rounded text-[10px]">${event.format}</span>` : ''}
                                        </div>
                                        <!-- Название мероприятия ниже -->
                                        <div class="font-bold text-slate-800 text-xs">${event.name}</div>
                                        
                                        <!-- Время работы -->
                                        <div class="text-[11px] text-slate-500 mt-1 flex flex-wrap gap-x-2 gap-y-0.5">
                                            <span>Приход: <strong class="${arrivalTime ? 'text-slate-700' : 'text-rose-500'}">${arrivalTime || 'НЕТ'}</strong></span>
                                            <span>Уход: <strong class="${departureTime ? 'text-slate-700' : 'text-rose-500'}">${departureTime || 'НЕТ'}</strong></span>
                                            ${!hoursCalc.error ? `<span class="bg-slate-100 text-slate-700 px-1 rounded font-medium">Отработано: ${hoursCalc.text}</span>` : ''}
                                        </div>
                                    </div>
                                    
                                    <!-- Ввод ставки -->
                                    <div class="flex flex-col items-end gap-1 shrink-0">
                                        <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">Ставка</span>
                                        <div class="relative flex items-center">
                                            <input type="number" 
                                                value="${currentRate}" 
                                                oninput="saveRate('${person.name}', '${event.id}', this.value)"
                                                onclick="event.stopPropagation();"
                                                placeholder="000" 
                                                min="0"
                                                max="999"
                                                class="w-14 py-0.5 px-1 text-xs text-center border border-slate-200 rounded-md focus:outline-none focus:ring-1 focus:ring-indigo-500 font-semibold text-slate-800 bg-white" />
                                            <span class="text-[10px] text-slate-400 ml-1">₽</span>
                                        </div>
                                        <!-- Динамический вывод суммы -->
                                        <span id="earned-val-${person.name}-${event.id}" class="text-[10px] font-bold ${isPko && isPaid ? 'text-emerald-600' : 'text-rose-600'}">
                                            ${eventEarned !== null ? `= ${eventEarned} ₽` : ''}
                                        </span>
                                    </div>
                                </div>
                                
                                <!-- Кнопки статуса (РКО и Выплата) -->
                                <div class="grid grid-cols-2 gap-1.5 mt-2">
                                    <button onclick="event.stopPropagation(); toggleStatus('${person.name}', '${event.id}', 'pko', this)" 
                                        class="pko-btn py-1 px-1.5 rounded-lg text-[11px] font-medium border flex items-center justify-center gap-1 transition-all ${
                                            isPko 
                                            ? 'bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm font-semibold' 
                                            : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                                        }">
                                        <i data-lucide="${isPko ? 'file-check-2' : 'file-text'}" class="w-3.5 h-3.5"></i>
                                        РКО написан
                                    </button>
                                    
                                    <button onclick="event.stopPropagation(); toggleStatus('${person.name}', '${event.id}', 'paid', this)" 
                                        class="paid-btn py-1 px-1.5 rounded-lg text-[11px] font-medium border flex items-center justify-center gap-1 transition-all ${
                                            isPaid 
                                            ? 'bg-blue-50 text-blue-700 border-blue-200 shadow-sm font-semibold' 
                                            : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'
                                        }">
                                        <i data-lucide="${isPaid ? 'check-circle-2' : 'circle'}" class="w-3.5 h-3.5"></i>
                                        Выплачено
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                }
                eventsHtml += '</div>';

                card.innerHTML = headerHtml + eventsHtml;
                grid.appendChild(card);
            });

            // Инициализация иконок Lucide
            lucide.createIcons();
        }

        // Функция изменения статуса при клике на кнопки
        window.toggleStatus = function(staffName, eventId, key, button) {
            const stateId = `${staffName}_${eventId}`;
            const states = getSavedStates();
            const currentVal = states[stateId]?.[key] || false;
            const newVal = !currentVal;

            saveState(staffName, eventId, key, newVal);

            // Визуальное обновление кнопок
            if (key === 'pko') {
                if (newVal) {
                    button.className = "pko-btn py-1 px-1.5 rounded-lg text-[11px] font-semibold border flex items-center justify-center gap-1 transition-all bg-emerald-50 text-emerald-700 border-emerald-200 shadow-sm";
                    button.innerHTML = '<i data-lucide="file-check-2" class="w-3.5 h-3.5"></i> РКО написан';
                } else {
                    button.className = "pko-btn py-1 px-1.5 rounded-lg text-[11px] font-medium border flex items-center justify-center gap-1 transition-all bg-white text-slate-500 border-slate-200 hover:bg-slate-50";
                    button.innerHTML = '<i data-lucide="file-text" class="w-3.5 h-3.5"></i> РКО написан';
                }
            } else if (key === 'paid') {
                if (newVal) {
                    button.className = "paid-btn py-1 px-1.5 rounded-lg text-[11px] font-semibold border flex items-center justify-center gap-1 transition-all bg-blue-50 text-blue-700 border-blue-200 shadow-sm";
                    button.innerHTML = '<i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> Выплачено';
                } else {
                    button.className = "paid-btn py-1 px-1.5 rounded-lg text-[11px] font-medium border flex items-center justify-center gap-1 transition-all bg-white text-slate-500 border-slate-200 hover:bg-slate-50";
                    button.innerHTML = '<i data-lucide="circle" class="w-3.5 h-3.5"></i> Выплачено';
                }
            }
            
            // Точечно пересчитываем баланс для этой карточки, не сбивая фокусы
            updateStaffCalculations(staffName);
            lucide.createIcons();
        }

        // Слушатель поиска
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderStaff(e.target.value);
        });

        // Первичный запуск — загрузка данных из репозитория
        window.onload = function() {
            fetchRepositoryData();
        };
    </script>
</body>
</html>
